<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zylo | Loading</title>
  <link rel="icon" href="/images/zylo/Zylo_icon.ico" type="image/x-icon" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#0d0d1a" />
  <script src="/files/js/theme-hydration.js"></script>
  <script src="/files/vendor/tailwindcss.js"></script>
  <link rel="stylesheet" href="/css/global.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          fontFamily: {
            display: ["Sora", "sans-serif"],
            body: ["DM Sans", "sans-serif"],
          }
        }
      }
    };
  </script>
  <style>
    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(145deg, #eceae3 0%, #e3e1da 50%, #d6d3cc 100%);
      color: #2b2a26;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .dark body {
      background: linear-gradient(145deg, #0d0d1a 0%, #1e1b4b 50%, #312e81 100%);
      color: white;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 15px 35px -5px rgba(0, 0, 0, 0.05);
      animation: formFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    
    .dark .glass-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    @keyframes formFadeIn {
      0% { opacity: 0; transform: translateY(20px) scale(0.95); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .logo-glow {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 140px; height: 140px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.3) 0%, transparent 70%);
      animation: pulseGlow 2.5s ease-in-out infinite;
      z-index: 0;
    }

    .dark body .logo-glow {
      background: radial-gradient(circle, rgba(139, 92, 246, 0.4) 0%, transparent 70%);
    }

    @keyframes pulseGlow {
      0%, 100% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.6; }
      50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.9; }
    }

    .progress-ring {
      transition: stroke-dashoffset 0.4s ease-out;
    }
    
    .pulse-logo {
      animation: logoPulse 4s ease-in-out infinite;
    }
    
    @keyframes logoPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); filter: drop-shadow(0 0 15px rgba(139, 92, 246, 0.5)); }
    }

    /* Floating particles */
    .particles {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    .particle {
      position: absolute;
      width: 4px; height: 4px;
      background: rgba(59, 130, 246, 0.5);
      border-radius: 50%;
      animation: particleFloat 8s ease-in-out infinite;
    }
    .dark body .particle {
      background: rgba(139, 92, 246, 0.5);
    }
    
    .particle:nth-child(1) { left: 10%; animation-delay: 0s; }
    .particle:nth-child(2) { left: 20%; animation-delay: 1s; }
    .particle:nth-child(3) { left: 35%; animation-delay: 2s; }
    .particle:nth-child(4) { left: 50%; animation-delay: 0.5s; }
    .particle:nth-child(5) { left: 65%; animation-delay: 1.5s; }
    .particle:nth-child(6) { left: 80%; animation-delay: 2.5s; }
    .particle:nth-child(7) { left: 90%; animation-delay: 0.8s; }
    
    @keyframes particleFloat {
      0%, 100% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 1; transform: translateY(90vh) scale(1); }
      90% { opacity: 1; transform: translateY(-10vh) scale(1); }
      100% { transform: translateY(-20vh) scale(0); opacity: 0; }
    }

    .welcome-text {
      background: linear-gradient(135deg, #1d4ed8 0%, #3b82f6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .dark body .welcome-text {
      background: linear-gradient(135deg, #fff 0%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
  </style>
</head>
<body class="select-none transition-colors duration-500">

  <!-- Floating Particles -->
  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <div class="glass-card flex flex-col items-center justify-center p-8 rounded-[2rem] w-full max-w-md mx-4 relative z-10">
    
    <!-- Circular Avatar Progress -->
    <div class="relative w-40 h-40 flex justify-center items-center mb-6">
      <div class="logo-glow"></div>
      
      <!-- Background Track -->
      <svg class="absolute inset-0 w-full h-full transform -rotate-90 pointer-events-none" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="46" fill="none" class="stroke-black/10 dark:stroke-white/10" stroke-width="4"></circle>
        <!-- The Dynamic Ring -->
        <circle id="progressCircle" cx="50" cy="50" r="46" fill="none" class="stroke-blue-500 dark:stroke-purple-500 progress-ring drop-shadow-md" stroke-width="4" stroke-dasharray="289" stroke-dashoffset="289" stroke-linecap="round"></circle>
      </svg>
      
      <!-- Logo inside -->
      <img src="/images/zylo/Zylo_icon.png" alt="Zylo Logo" class="relative z-10 w-20 h-20 filter drop-shadow-lg pulse-logo" />
      
      <!-- Percentage Text -->
      <div id="percentage" class="absolute -bottom-2 right-2 bg-blue-100 text-blue-700 dark:bg-purple-900/50 dark:text-purple-300 backdrop-blur font-bold text-xs px-2.5 py-1 rounded-full shadow border border-blue-200 dark:border-purple-500/30 z-20 transition-all font-display">0%</div>
    </div>

    <!-- Text Content -->
    <div class="text-center w-full">
      <h2 id="welcomeMsg" class="font-display text-2xl font-bold tracking-tight welcome-text mb-2"></h2>
      <p id="taskText" class="text-gray-600 dark:text-gray-300 text-sm mb-4 font-medium h-5">Initializing...</p>
      
      <!-- Meta Details -->
      <div class="flex items-center justify-center gap-3 text-xs text-gray-500 dark:text-gray-400 font-medium">
        <span id="timeRemaining">Calculating...</span>
      </div>
    </div>

    <!-- Loading Tip -->
    <div class="mt-8 bg-black/5 dark:bg-black/30 border border-black/5 dark:border-white/5 rounded-xl p-3 w-full text-center">
      <div class="flex items-center justify-center gap-1.5 text-blue-500 dark:text-purple-400 mb-1">
        <i data-feather="info" class="w-4 h-4"></i>
        <span class="text-xs font-bold uppercase tracking-wider">Helpful Tip</span>
      </div>
      <p id="tipText" class="text-gray-600 dark:text-gray-400 text-xs leading-relaxed transition-opacity duration-500 opacity-100">You can customize your profile in Settings.</p>
    </div>

    <!-- Skip Action -->
    <button id="skipBtn" onclick="skipLoading()" class="mt-6 text-xs text-gray-500 hover:text-gray-800 dark:text-gray-500 dark:hover:text-white transition-colors duration-300 opacity-0 pointer-events-none pb-2 border-b border-transparent hover:border-gray-800 dark:hover:border-white">
      Skip Loading
    </button>
  </div>

  <script src="/files/vendor/feather-icons.js"></script>
  <script>
    feather.replace();

    const tasks = [
      { key: "init", label: "Initializing Zylo engine...", weight: 10, duration: 400 },
      { key: "verify", label: "Verifying session...", weight: 15, duration: 600 },
      {
        key: "user", label: "Fetching user profile...", weight: 20, duration: 800,
        action: async () => {
           const u = localStorage.getItem("username");
           if (u) { try { await fetch(`/api/get-user?identifier=${encodeURIComponent(u)}`); } catch {} }
        },
      },
      { key: "theme", label: "Applying visual preferences...", weight: 10, duration: 300 },
      {
        key: "messages", label: "Decrypting messages...", weight: 25, duration: 1000,
        action: async () => { try { await fetch("/api/messages"); } catch {} },
      },
      {
        key: "groups", label: "Syncing group channels...", weight: 15, duration: 700,
        action: async () => {
          const u = localStorage.getItem("username");
          if (u) { try { await fetch(`/api/groups?username=${encodeURIComponent(u)}`); } catch {} }
        },
      },
      { key: "final", label: "Finishing up...", weight: 5, duration: 400 },
    ];

    const tips = [
      "You can customize your profile in Settings.",
      "Join groups to meet new people!",
      "Use markdown to format your messages.",
      "Drag and drop files to share them quickly.",
      "Right-click messages for more options.",
      "Check the Explore page for public communities.",
      "Toggle dark mode by clicking your avatar."
    ];

    const textEl = document.getElementById("taskText");
    const progressCircle = document.getElementById("progressCircle");
    const percentageEl = document.getElementById("percentage");
    const timeEl = document.getElementById("timeRemaining");
    const welcomeEl = document.getElementById("welcomeMsg");
    const tipEl = document.getElementById("tipText");
    const skipBtn = document.getElementById("skipBtn");

    const circleLength = 289; // SVG Circle Dasharray Constant
    let currentProgress = 0;
    let targetProgress = 0;
    let startTime = Date.now();
    let skipped = false;

    const username = localStorage.getItem("username");
    welcomeEl.textContent = username ? `Welcome back, ${username}!` : "Welcome to Zylo";

    // Dynamic Tip Interval
    let tipInterval = setInterval(() => {
      tipEl.style.opacity = '0';
      setTimeout(() => {
        tipEl.textContent = tips[Math.floor(Math.random() * tips.length)];
        tipEl.style.opacity = '1';
      }, 500);
    }, 4500);

    // Show skip after 3 seconds
    setTimeout(() => { 
        skipBtn.style.opacity = '1';
        skipBtn.style.pointerEvents = 'auto'; 
    }, 3000);

    // Main Progress visual update
    function updateProgress() {
      if (skipped) return;
      if (currentProgress < targetProgress) {
        currentProgress += (targetProgress - currentProgress) * 0.1;
        if (Math.abs(targetProgress - currentProgress) < 0.1) currentProgress = targetProgress;
      }
      
      const offset = circleLength - (currentProgress / 100) * circleLength;
      progressCircle.style.strokeDashoffset = offset;
      percentageEl.textContent = `${Math.round(currentProgress)}%`;
      
      const elapsedTime = Date.now() - startTime;
      if (currentProgress > 0 && currentProgress < 100) {
        const totalEstimatedTime = (elapsedTime / currentProgress) * 100;
        const remaining = Math.max(0, Math.ceil((totalEstimatedTime - elapsedTime) / 1000));
        timeEl.textContent = `Estimated time: ${remaining}s`;
      } else if (currentProgress >= 100) {
        timeEl.textContent = "Ready!";
      }
      requestAnimationFrame(updateProgress);
    }

    async function processTasks() {
      let totalWeight = tasks.reduce((a, b) => a + b.weight, 0);
      let accumulatedWeight = 0;
      for (const task of tasks) {
        if (skipped) break;
        
        textEl.style.opacity = 0;
        setTimeout(() => {
          textEl.textContent = task.label;
          textEl.style.opacity = 1;
        }, 200);

        const start = Date.now();
        if (task.action) { try { await task.action(); } catch (e) { console.error(e); } }
        const elapsed = Date.now() - start;
        const remaining = Math.max(0, task.duration - elapsed);
        if (remaining > 0) await new Promise((r) => setTimeout(r, remaining));
        accumulatedWeight += task.weight;
        targetProgress = (accumulatedWeight / totalWeight) * 100;
      }
      if (!skipped) completeLoading();
    }

    function completeLoading() {
      targetProgress = 100;
      currentProgress = 100;
      progressCircle.style.strokeDashoffset = 0;
      percentageEl.textContent = "100%";
      textEl.textContent = "Welcome!";
      timeEl.textContent = "Launching...";
      clearInterval(tipInterval);
      
      skipBtn.style.opacity = '0';
      skipBtn.style.pointerEvents = 'none';

      setTimeout(() => {
        document.body.style.transition = "opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1)";
        document.body.style.opacity = "0";
        document.querySelector('.glass-card').style.transition = "transform 0.6s cubic-bezier(0.16, 1, 0.3, 1)";
        document.querySelector('.glass-card').style.transform = "scale(1.05)";
        
        setTimeout(() => { window.location.href = "mainapp.html"; }, 600);
      }, 500);
    }

    function skipLoading() {
      skipped = true;
      completeLoading();
    }

    requestAnimationFrame(updateProgress);
    window.addEventListener("load", processTasks);

    // Click handler for catching hard reloads smoothly
    document.addEventListener("click", (e) => {
      const link = e.target.closest("a");
      if (link && link.hostname === window.location.hostname) {
        e.preventDefault();
        document.body.style.opacity = "0";
        setTimeout(() => (window.location.href = link.href), 500);
      }
    });
  </script>
  <script src="/files/sw-register.js"></script>
</body>
</html>
